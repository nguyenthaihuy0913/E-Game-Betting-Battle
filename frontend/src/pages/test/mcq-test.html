<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MCQ Test Interface - Grammar & Vocab Betting Battle</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/test-pages.css">
</head>

<body>
  <!-- Global Canvas/Background -->
  <canvas id="cv"></canvas>
  <div class="grain"></div>
  <div class="particles" id="pt"></div>

  <div class="page">
    <div class="hero">
      <div class="live-badge">
        <div class="ldot"></div>
        TEST MODE
      </div>
      <h1 class="gtitle">Multiple Choice <span class="w-sky">Test</span></h1>
      <p class="tsub">Previewing extracted questions from SUMMIT 1 U5</p>
    </div>

    <!-- Main MCQ Container -->
    <div class="test-container" id="mcq-container">
      <div class="question-card">
        <!-- Question Badge -->
        <div class="q-badge" id="q-counter">
          Q 1 / 30
        </div>

        <!-- Question Text -->
        <h2 class="q-text" id="q-text">Loading question...</h2>

        <!-- Options Grid -->
        <div class="options-grid" id="options-grid">
          <!-- Dynamically populated via JS -->
        </div>

        <div class="feedback-msg" id="feedback-msg"></div>

        <!-- Pagination -->
        <div class="test-nav">
          <div class="score-hud">Score: <span id="score">0</span></div>
          <button class="btn bh" id="next-btn" style="width: 140px; display: none;">Next &rarr;</button>
        </div>
      </div>

      <div class="bottom" style="margin-top: 20px;">
        <button class="chip" onclick="window.location.href='gap-fill-test.html'">Switch to Gap-Fill Test</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/main.js"></script>
  <script src="../../scripts/mcq-test.js"></script>
</body>

</html>
