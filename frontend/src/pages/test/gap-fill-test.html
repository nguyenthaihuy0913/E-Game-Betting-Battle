<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gap-Fill Test Interface - Grammar & Vocab Betting Battle</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/test-pages.css">
</head>

<body>
  <!-- Global Canvas/Background -->
  <canvas id="cv"></canvas>
  <div class="grain"></div>
  <div class="particles" id="pt"></div>

  <div class="page">
    <div class="hero">
      <div class="live-badge">
        <div class="ldot"></div>
        TEST MODE
      </div>
      <h1 class="gtitle">Gap-Fill <span class="w-gold">Test</span></h1>
      <p class="tsub">Previewing extracted questions from SUMMIT 1 U5</p>
    </div>

    <!-- Main Container -->
    <div class="test-container" id="gf-container">
      <div class="question-card" style="border-color: rgba(251, 191, 36, 0.15);">
        <!-- Question Badge -->
        <div class="q-badge" id="q-counter" style="background: linear-gradient(135deg, var(--gold), var(--gold2)); box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);">
          Q 1 / 20
        </div>

        <!-- Question Text -->
        <h2 class="q-text" id="q-text" style="margin-bottom: 10px;">Loading question...</h2>

        <div style="font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--ink3); margin-bottom: 20px;">
          Type your answer below and click submit or press Enter.
        </div>

        <input type="text" id="gf-input" class="gap-fill-input" placeholder="Type your answer here..." autocomplete="off">

        <button class="btn bj" id="submit-btn" style="width: 100%; height: 56px; font-size: 18px; border-radius: 16px;">Check Answer</button>

        <div class="feedback-msg" id="feedback-msg"></div>

        <!-- Pagination -->
        <div class="test-nav">
          <div class="score-hud">Score: <span id="score">0</span></div>
          <button class="btn bh" id="next-btn" style="width: 140px; display: none;">Next &rarr;</button>
        </div>
      </div>

      <div class="bottom" style="margin-top: 20px;">
        <button class="chip" onclick="window.location.href='mcq-test.html'">Switch to MCQ Test</button>
      </div>
    </div>
  </div>

  <script src="../../scripts/main.js"></script>
  <script src="../../scripts/gap-fill-test.js"></script>
</body>

</html>
